openapi: 3.0.3
info:
  title: Palantir Agent API
  version: 1.0.0

paths:
  /v1/events:
    post:
      summary: Ingest de eventos (batch)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/Event'
      responses:
        "202": { description: Accepted }
components:
  schemas:
    Event:
      type: object
      required: [ts, type, source, payload]
      properties:
        ts: { type: string, format: date-time }
        type: { type: string }
        source: { type: string }
        agent_id: { type: string }
        payload: { type: object, additionalProperties: true }
